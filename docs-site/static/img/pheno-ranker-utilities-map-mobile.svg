<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1850" role="img" aria-labelledby="utilities-mobile-title utilities-mobile-description">
  <title id="utilities-mobile-title">Where the four companion utilities enter the Pheno-Ranker workflow</title>
  <desc id="utilities-mobile-description">
    A vertical workflow map for narrow screens. It shows the core analysis path followed by four optional utilities that generate, convert, inspect, or reuse Pheno-Ranker artifacts.
  </desc>
  <defs>
    <symbol id="artifact-records-mobile" viewBox="0 0 100 80">
      <rect class="artifact-light" x="8" y="13" width="70" height="58" rx="4" />
      <rect class="artifact-frame" x="17" y="5" width="70" height="58" rx="4" />
      <circle class="artifact-accent" cx="29" cy="21" r="3" />
      <path class="artifact-stroke" d="M38 21 H74 M27 33 H76 M27 44 H68 M27 55 H73" />
    </symbol>
    <symbol id="artifact-files-mobile" viewBox="0 0 100 80">
      <rect class="artifact-frame" x="6" y="8" width="40" height="62" rx="4" />
      <rect class="artifact-frame" x="54" y="8" width="40" height="62" rx="4" />
      <rect class="artifact-light" x="12" y="15" width="28" height="17" rx="2" />
      <rect class="artifact-light" x="60" y="15" width="28" height="17" rx="2" />
      <text class="artifact-text center" x="26" y="27">JSON</text>
      <text class="artifact-text center" x="74" y="27">YAML</text>
      <path class="artifact-stroke" d="M14 42 H38 M14 51 H34 M14 60 H37 M62 42 H86 M62 51 H83 M62 60 H87" />
    </symbol>
    <symbol id="artifact-plot-mobile" viewBox="0 0 100 80">
      <rect class="artifact-frame" x="3" y="4" width="94" height="72" rx="4" />
      <path class="artifact-stroke" d="M17 14 V63 H89" />
      <rect class="artifact-light" x="25" y="43" width="10" height="20" />
      <rect class="artifact-light" x="42" y="31" width="10" height="32" />
      <rect class="artifact-light" x="59" y="48" width="10" height="15" />
      <rect class="artifact-light" x="76" y="24" width="10" height="39" />
      <path class="artifact-accent-stroke" d="M24 38 L43 25 L61 34 L80 17" />
      <circle class="artifact-accent" cx="24" cy="38" r="2.5" />
      <circle class="artifact-accent" cx="43" cy="25" r="2.5" />
      <circle class="artifact-accent" cx="61" cy="34" r="2.5" />
      <circle class="artifact-accent" cx="80" cy="17" r="2.5" />
    </symbol>
    <symbol id="artifact-matrix-rank-mobile" viewBox="0 0 110 80">
      <g class="artifact-grid">
        <rect x="3" y="9" width="17" height="17" /><rect x="20" y="9" width="17" height="17" /><rect x="37" y="9" width="17" height="17" />
        <rect x="3" y="26" width="17" height="17" /><rect class="artifact-light" x="20" y="26" width="17" height="17" /><rect x="37" y="26" width="17" height="17" />
        <rect x="3" y="43" width="17" height="17" /><rect x="20" y="43" width="17" height="17" /><rect x="37" y="43" width="17" height="17" />
      </g>
      <circle class="artifact-accent" cx="69" cy="18" r="4" />
      <circle class="artifact-ink" cx="69" cy="35" r="4" />
      <circle class="artifact-ink" cx="69" cy="52" r="4" />
      <path class="artifact-stroke" d="M79 18 H106 M79 35 H99 M79 52 H93" />
    </symbol>
    <symbol id="artifact-qr-report-mobile" viewBox="0 0 120 90">
      <rect class="artifact-frame" x="2" y="5" width="66" height="66" rx="3" />
      <path class="artifact-ink" fill-rule="evenodd" d="M8 11 H28 V31 H8 Z M12 15 V27 H24 V15 Z M42 11 H62 V31 H42 Z M46 15 V27 H58 V15 Z M8 45 H28 V65 H8 Z M12 49 V61 H24 V49 Z" />
      <path class="artifact-ink" d="M34 11 H39 V17 H34 Z M31 21 H37 V28 H31 Z M35 34 H42 V41 H35 Z M45 34 H51 V40 H45 Z M56 35 H62 V43 H56 Z M31 47 H38 V54 H31 Z M41 45 H47 V51 H41 Z M50 48 H57 V55 H50 Z M59 57 H64 V64 H59 Z M35 59 H43 V66 H35 Z M47 58 H53 V64 H47 Z" />
      <rect class="artifact-frame" x="77" y="8" width="38" height="66" rx="4" />
      <rect class="artifact-accent" x="84" y="17" width="24" height="6" rx="2" />
      <path class="artifact-stroke" d="M84 32 H108 M84 41 H108 M84 50 H104 M84 59 H109" />
      <text class="artifact-text center" x="96" y="86">QR + PDF</text>
    </symbol>
    <marker id="utilities-mobile-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#2f6472" />
    </marker>
  </defs>
  <style>
    .canvas { fill: #ffffff; }
    .panel { fill: #fbfcfc; stroke: #a8b8bd; stroke-width: 2; }
    .head-generate { fill: #eaf2f0; }
    .head-convert { fill: #edf3f8; }
    .head-inspect { fill: #eef6ee; }
    .head-reuse { fill: #fff4eb; }
    .code-box { fill: #ffffff; stroke: #bdc9cd; stroke-width: 1.5; }
    .input-node { fill: #ffffff; stroke: #7799a3; stroke-width: 2; }
    .core-node { fill: #244b5a; stroke: #16323d; stroke-width: 2; }
    .output-node { fill: #ffffff; stroke: #7799a3; stroke-width: 2; }
    .node-band { fill: #eaf2f0; }
    .artifact-frame { fill: #ffffff; stroke: #7899a3; stroke-width: 1.4; }
    .artifact-light { fill: #dce9e7; stroke: #7899a3; stroke-width: 1; }
    .artifact-ink { fill: #2f6472; }
    .artifact-accent { fill: #b76932; }
    .artifact-stroke { fill: none; stroke: #7899a3; stroke-width: 1.5; stroke-linecap: round; }
    .artifact-accent-stroke { fill: none; stroke: #b76932; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .artifact-grid rect { fill: #ffffff; stroke: #7899a3; stroke-width: 1; }
    .artifact-text { fill: #244b5a; font-family: Arial, Helvetica, sans-serif; font-size: 9px; font-weight: 700; }
    .flow { fill: none; stroke: #2f6472; stroke-width: 3; stroke-linecap: round; marker-end: url(#utilities-mobile-arrow); }
    .rule { stroke: #c4ced1; stroke-width: 1.5; }
    .title { fill: #16323d; font-family: Arial, Helvetica, sans-serif; font-size: 31px; font-weight: 700; }
    .subtitle { fill: #5b7179; font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 400; }
    .map-label { fill: #657980; font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; }
    .panel-letter { fill: #985a2d; font-family: Arial, Helvetica, sans-serif; font-size: 23px; font-weight: 700; }
    .panel-title { fill: #244b5a; font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; }
    .relation { fill: #657980; font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 700; text-anchor: end; }
    .relation-rust { fill: #985a2d; font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 700; text-anchor: end; }
    .section-label { fill: #657980; font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; }
    .body { fill: #405b65; font-family: Arial, Helvetica, sans-serif; font-size: 19px; font-weight: 400; }
    .body-strong { fill: #244b5a; font-family: Arial, Helvetica, sans-serif; font-size: 19px; font-weight: 700; }
    .mono { fill: #314e58; font-family: "Courier New", Courier, monospace; font-size: 17px; font-weight: 400; }
    .mono-strong { fill: #244b5a; font-family: "Courier New", Courier, monospace; font-size: 18px; font-weight: 700; }
    .node-title { fill: #244b5a; font-family: Arial, Helvetica, sans-serif; font-size: 19px; font-weight: 700; text-anchor: middle; }
    .node-body { fill: #526b74; font-family: Arial, Helvetica, sans-serif; font-size: 17px; font-weight: 400; text-anchor: middle; }
    .core-title { fill: #ffffff; font-family: "Courier New", Courier, monospace; font-size: 24px; font-weight: 700; text-anchor: middle; }
    .core-body { fill: #dcebed; font-family: "Courier New", Courier, monospace; font-size: 17px; font-weight: 400; text-anchor: middle; }
    .footnote { fill: #657980; font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 400; text-anchor: middle; }
    .center { text-anchor: middle; }
  </style>

  <rect class="canvas" x="0" y="0" width="720" height="1850" />
  <text class="title" x="32" y="43">Companion utilities around the core CLI</text>
  <text class="subtitle" x="32" y="73">Four optional tools generate, convert, inspect, or reuse</text>
  <text class="subtitle" x="32" y="97">artifacts from the analysis workflow.</text>

  <text class="map-label" x="58" y="132">CORE ANALYSIS PATH</text>
  <rect class="input-node" x="58" y="150" width="604" height="112" rx="6" />
  <rect class="node-band" x="58" y="150" width="190" height="112" rx="6" />
  <text class="node-title" x="153" y="212">ANALYSIS INPUT</text>
  <text class="node-body" x="455" y="187">Reference cohort + optional target</text>
  <text class="mono center" x="455" y="218">BFF | PXF | configured JSON</text>
  <text class="node-body" x="455" y="244">Existing, simulated, or CSV-derived</text>

  <path class="flow" d="M360 262 V316" />

  <rect class="core-node" x="58" y="316" width="604" height="112" rx="6" />
  <text class="core-title" x="360" y="358">pheno-ranker</text>
  <text class="core-body" x="360" y="390">-r references [-t target] [--export]</text>

  <path class="flow" d="M360 428 V482" />

  <rect class="output-node" x="58" y="482" width="604" height="112" rx="6" />
  <rect class="node-band" x="58" y="482" width="190" height="112" rx="6" />
  <text class="node-title" x="153" y="544">OUTPUT</text>
  <use href="#artifact-matrix-rank-mobile" x="262" y="495" width="125" height="90" />
  <text class="mono-strong center" x="515" y="520">matrix.txt | rank.txt</text>
  <text class="node-body" x="515" y="550">Intermediate artifacts</text>
  <text class="mono center" x="515" y="578">export.*.json</text>

  <text class="map-label" x="58" y="632">OPTIONAL UTILITY CONNECTIONS</text>

  <g aria-label="Generate synthetic records">
    <rect class="panel" x="32" y="650" width="656" height="238" rx="7" />
    <rect class="head-generate" x="32" y="650" width="656" height="62" rx="7" />
    <path class="head-generate" d="M32 705 H688 V712 H32 Z" />
    <text class="panel-letter" x="58" y="691">A</text>
    <text class="panel-title" x="94" y="690">GENERATE SYNTHETIC RECORDS</text>
    <text class="relation" x="662" y="690">FEEDS INPUT</text>
    <text class="section-label" x="58" y="748">INPUT</text>
    <text class="body" x="138" y="748">Ontology pools + simulation parameters</text>
    <rect class="code-box" x="58" y="770" width="604" height="48" rx="4" />
    <text class="mono-strong center" x="360" y="801">bff-pxf-simulator</text>
    <text class="section-label" x="58" y="852">OUTPUT</text>
    <text class="body-strong" x="138" y="852">Synthetic BFF or PXF JSON cohort</text>
    <use href="#artifact-records-mobile" x="535" y="805" width="110" height="82" />
  </g>

  <g aria-label="Convert tabular data">
    <rect class="panel" x="32" y="914" width="656" height="252" rx="7" />
    <rect class="head-convert" x="32" y="914" width="656" height="62" rx="7" />
    <path class="head-convert" d="M32 969 H688 V976 H32 Z" />
    <text class="panel-letter" x="58" y="955">B</text>
    <text class="panel-title" x="94" y="954">CONVERT TABULAR DATA</text>
    <text class="relation" x="662" y="954">FEEDS INPUT</text>
    <text class="section-label" x="58" y="1012">INPUT</text>
    <text class="body" x="138" y="1012">CSV + delimiter and identifier rules</text>
    <rect class="code-box" x="58" y="1034" width="604" height="48" rx="4" />
    <text class="mono-strong center" x="360" y="1065">csv2pheno-ranker</text>
    <text class="section-label" x="58" y="1116">OUTPUT</text>
    <text class="body-strong" x="138" y="1116">Configured records and matching schema</text>
    <text class="mono" x="138" y="1146">*.json + *_config.yaml</text>
    <use href="#artifact-files-mobile" x="535" y="1078" width="108" height="86" />
  </g>

  <g aria-label="Profile BFF or PXF records">
    <rect class="panel" x="32" y="1192" width="656" height="238" rx="7" />
    <rect class="head-inspect" x="32" y="1192" width="656" height="62" rx="7" />
    <path class="head-inspect" d="M32 1247 H688 V1254 H32 Z" />
    <text class="panel-letter" x="58" y="1233">C</text>
    <text class="panel-title" x="94" y="1232">PROFILE SOURCE RECORDS</text>
    <text class="relation" x="662" y="1232">READS BFF / PXF</text>
    <text class="section-label" x="58" y="1290">INPUT</text>
    <text class="body" x="138" y="1290">BFF or PXF records (JSON / YAML)</text>
    <rect class="code-box" x="58" y="1312" width="604" height="48" rx="4" />
    <text class="mono-strong center" x="360" y="1343">bff-pxf-plot</text>
    <text class="section-label" x="58" y="1394">OUTPUT</text>
    <text class="body-strong" x="138" y="1394">Summary plots: output_plots.png</text>
    <use href="#artifact-plot-mobile" x="526" y="1342" width="120" height="86" />
  </g>

  <g aria-label="Encode, decode, and report exported vectors">
    <rect class="panel" x="32" y="1456" width="656" height="292" rx="7" />
    <rect class="head-reuse" x="32" y="1456" width="656" height="62" rx="7" />
    <path class="head-reuse" d="M32 1511 H688 V1518 H32 Z" />
    <text class="panel-letter" x="58" y="1497">D</text>
    <text class="panel-title" x="94" y="1496">ENCODE, DECODE, AND REPORT</text>
    <text class="relation-rust" x="662" y="1496">READS --EXPORT</text>
    <text class="section-label" x="58" y="1554">INPUT</text>
    <text class="mono" x="138" y="1554">ref_binary_hash.json + glob_hash.json</text>
    <rect class="code-box" x="58" y="1576" width="604" height="48" rx="4" />
    <text class="mono-strong center" x="360" y="1607">barcode command suite</text>
    <text class="section-label" x="58" y="1658">OUTPUT</text>
    <text class="body-strong" x="138" y="1658">QR PNG | JSON | PDF</text>
    <line class="rule" x1="58" y1="1682" x2="500" y2="1682" />
    <text class="mono center" x="278" y="1712">pheno-ranker2barcode</text>
    <text class="mono center" x="278" y="1738">barcode2pheno-ranker | pheno-ranker2pdf</text>
    <use href="#artifact-qr-report-mobile" x="520" y="1628" width="132" height="105" />
  </g>

  <text class="footnote" x="360" y="1792">Utilities are optional; connection labels identify the artifacts each one reads.</text>
  <text class="footnote" x="360" y="1818">The four panels are not a required execution sequence.</text>
</svg>
